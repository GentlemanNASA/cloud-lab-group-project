<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Cyber G6</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo">CYBER G6</div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="contact.html" class="active">Contact</a></li>
        </ul>
    </nav>

    <header class="page-header">
        <h1>Contact Cyber G6</h1>
        <p>Reach out about security questions, campus systems, or project support.</p>
    </header>

    <section class="contact-section">
        <form class="scroll-form" action="#" method="POST">
            <div class="form-group">
                <label for="alias">Your Alias</label>
                <input type="text" id="alias" name="alias" placeholder="Enter your name or handle" required>
            </div>

            <div class="form-group">
                <label for="report">Message</label>
                <textarea id="report" name="report" rows="6" placeholder="Tell us about your request or concern" required></textarea>
            </div>

            <button type="submit" class="btn">Send Message</button>
        </form>
    </section>

</body>
</html>
